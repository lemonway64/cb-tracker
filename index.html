<script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxFy6rm5fL7z1JdotaqDsCM3heGQDkhoYj_mMDWkTOSFpuAdmke1ngF5RpRUdMxa-3XzQ/exec';

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('cb-list');
                document.getElementById('loading').classList.add('hidden');

                // 按日期排序 (最新的在上面)
                data.sort((a, b) => new Date(b.date) - new Date(a.date));

                container.innerHTML = data.map(item => `
                    <tr class="hover:bg-blue-50 border-b border-gray-100">
                        <td class="p-4">
                            <div class="font-bold text-blue-700 text-lg">${item.code}</div>
                            <div class="text-sm text-gray-500 font-medium">${item.name}</div>
                        </td>
                        <td class="p-4">
                            <span class="text-gray-700">${item.date}</span>
                            <div class="text-[10px] text-gray-400">發現日: ${item.captureDate || '記錄中'}</div>
                        </td>
                        <td class="p-4">
                            <div class="inline-block px-3 py-1 rounded text-xs font-bold bg-blue-100 text-blue-800">
                                ${item.status}
                            </div>
                        </td>
                        <td class="p-4 font-mono text-emerald-600 font-bold">${item.amount}</td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('loading').innerText = "讀取失敗";
            }
        }
        loadData();
    </script>
